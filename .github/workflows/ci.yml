name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_ENV: ci

jobs:
  # ==================== UNIT TESTS ====================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        env:
          APP_ENV: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          retention-days: 5

  # ==================== AI INCIDENT RESOLVER ====================
  ai-incident-resolver:
    name: AI Incident Analyzer
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate AI Incident Report
        run: node scripts/ai-resolver.js logs/pipeline_failure.log
        continue-on-error: true

      - name: Upload Incident Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incident-report
          path: artifacts/incident_report.md
          retention-days: 10

      - name: Comment PR with Incident Report
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join('artifacts', 'incident_report.md');
            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🚨 AI Incident Report\n\n${report}`
              });
            }

  # ==================== BUILD & ARTIFACT ====================
  build:
    name: Build Application
    needs: test
    runs-on: ubuntu-latest
    if: success()
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifacts
        run: |
          mkdir -p artifacts
          echo "Build completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > artifacts/build-info.txt
          echo "Commit: ${{ github.sha }}" >> artifacts/build-info.txt
          echo "Branch: ${{ github.ref }}" >> artifacts/build-info.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/
          retention-days: 30

  # ==================== SMOKE TESTS (Staging) ====================
  smoke-test:
    name: Smoke Tests
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for app to be ready
        run: sleep 5

      - name: Test Health Endpoint
        run: |
          curl -f http://localhost:3001/health || exit 1
        continue-on-error: true

      - name: Log smoke test result
        if: failure()
        run: echo "::error::Smoke test failed on health endpoint"

  # ==================== DEPLOYMENT TO STAGING ====================
  deploy-staging:
    name: Deploy to Staging
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        id: deploy
        run: |
          echo "::notice::Staging deployment would happen here"
          echo "url=https://staging-demo.example.com" >> $GITHUB_OUTPUT
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}

      - name: Verify staging deployment
        run: |
          echo "Verifying staging deployment..."
          echo "In production, this would check: curl https://staging-demo.example.com/health"

  # ==================== DEPLOYMENT TO PRODUCTION ====================
  deploy-production:
    name: Deploy to Production
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        id: deploy
        run: |
          echo "::notice::Production deployment would happen here"
          echo "url=https://api.example.com" >> $GITHUB_OUTPUT
        env:
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}

      - name: Health check
        id: health
        run: |
          echo "Checking production health..."
          echo "In production: curl https://api.example.com/health"
          exit 0

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Production health check failed, initiating rollback"
          echo "Rolling back to previous version..."

  # ==================== SUMMARY ====================
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always()
    steps:
      - name: Pipeline Status
        run: |
          echo "Pipeline Status Summary"
          echo "======================="
          echo "Test Status: ${{ needs.test.result }}"
          echo "Build Status: ${{ needs.build.result }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Author: ${{ github.actor }}"
